name: Daily Briefing

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Print runtime diagnostics
        run: |
          python --version
          pwd
          ls -la

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily briefing (debug mode)
        env:
          DEBUG_BRIEFING: "1"
        run: python -u generate_briefing.py

      - name: Debug weather JSON preview
        run: |
          echo "----- weather-goteborg.json (first 40 lines) -----"
          sed -n '1,40p' docs/data/weather-goteborg.json

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-briefing-debug
          path: debug/
          if-no-files-found: warn

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain docs/index.html docs/data/weather-goteborg.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/index.html docs/data/weather-goteborg.json
            git commit -m "chore: update daily briefing"
            git push
          else
            echo "No changes in generated docs files"
          fi
