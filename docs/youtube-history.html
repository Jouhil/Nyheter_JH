<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YouTube historik</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>YouTube historik</h1>
      <p>Tidigare dagar från dina prenumerationer</p>
    </div>
    <div class="updated"><a class="history-link-btn" href="index.html">Till startsidan</a></div>
  </header>

  <main class="container history-container">
    <section class="card history-card">
      <h2>Tillgängliga datum</h2>
      <div id="history-date-list" class="history-date-list">
        <p class="muted">Laddar datum...</p>
      </div>
    </section>

    <section class="card history-card history-days-card">
      <h2>Arkiv</h2>
      <div id="history-days" class="history-days-root">
        <p class="muted">Laddar historik...</p>
      </div>
    </section>
  </main>

  <script src="youtube-common.js" defer></script>
  <script src="youtube-history.js" defer></script>
</body>
</html>
